name: Build Desktop App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # 安定版の「20」に変更（24はまだGitHub側で未対応のエラーになるケースがあるため）
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Windows installer
        run: npm run dist:win
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe # distフォルダ内のexeファイルを保存
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # 安定版の「20」に変更
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Mac DMG
        run: npm run dist:mac
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg # distフォルダ内のdmgファイルを保存
          retention-days: 30
