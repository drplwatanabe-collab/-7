<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;">
<title>サロン売上管理ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#f0efeb;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9b9b96;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --success:#1D9E75;--danger:#E24B4A;--warning:#BA7517;
  --radius:8px;--radius-lg:12px;
  --font:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#282826;--bg3:#323230;
  --text:#f0efeb;--text2:#9b9b96;--text3:#6b6b66;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
}}

/* ===== レイアウト基盤 ===== */
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg3);color:var(--text);font-size:14px;display:flex;flex-direction:column}
#app-screen{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* タイトルバー */
.titlebar{flex-shrink:0;background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;-webkit-app-region:drag;user-select:none}
.titlebar-icon{width:28px;height:28px;background:#378ADD;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;-webkit-app-region:no-drag}
.titlebar h1{font-size:14px;font-weight:500;color:var(--text)}
.titlebar-sub{font-size:12px;color:var(--text3)}

/* mainエリア：タブ＋コンテンツを縦に並べる */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* タブ行：固定（縮まない） */
.tabs{flex-shrink:0;display:flex;gap:6px;flex-wrap:wrap;padding:14px 24px 12px;background:var(--bg3);border-bottom:0.5px solid var(--border)}
.tab{padding:6px 14px;font-size:13px;background:transparent;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text2);transition:all .15s;font-family:var(--font)}
.tab:hover{background:var(--bg2);color:var(--text)}
.tab.active{background:var(--bg2);color:var(--text);border-color:var(--border2)}

/* 各viewエリア：残り全高さでスクロール */
.view{display:none}
.view.active{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}

/* view内のスクロール可能コンテンツ */
.view-scroll{overflow-y:auto;flex:1;padding:16px 24px 40px;min-height:0}

/* データ入力・ランキングの固定操作パネル */
.fixed-panel{flex-shrink:0;padding:14px 24px 12px;background:var(--bg3);border-bottom:0.5px solid var(--border)}

/* ===== 共通コンポーネント ===== */
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.row label{font-size:13px;color:var(--text2);min-width:44px}
select,input[type=text],input[type=number]{font-size:13px;padding:5px 9px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font)}
.btn{padding:6px 14px;font-size:13px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;color:var(--text2);font-family:var(--font)}
.btn:hover{background:var(--bg2);color:var(--text)}
.btn-primary{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.notice{font-size:12px;color:var(--success);min-height:16px;margin-top:6px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:12px 16px}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
.up{color:var(--success)}.down{color:var(--danger)}
.sec{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.05em;margin-bottom:10px;margin-top:20px;text-transform:uppercase}
.sec:first-child{margin-top:0}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;font-weight:500;font-size:12px;color:var(--text2);padding:7px 10px;border-bottom:0.5px solid var(--border)}
td{padding:8px 10px;border-bottom:0.5px solid var(--border);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--bg2)}
.badge{display:inline-block;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:11px;font-weight:500;background:var(--bg2);color:var(--text2)}
.gold{background:#FAC775;color:#412402}.silver{background:#D3D1C7;color:#2C2C2A}.bronze{background:#F5C4B3;color:#4A1B0C}
.bar-wrap{height:5px;background:var(--bg2);border-radius:3px;margin-top:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.spill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500}
.month-btns{display:flex;gap:4px;flex-wrap:wrap}
.mbtn{padding:4px 10px;font-size:12px;background:transparent;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text2);font-family:var(--font)}
.mbtn:hover{background:var(--bg2)}
.mbtn.active{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 6px;line-height:1}
.del-btn:hover{color:var(--danger)}
.tag{padding:5px 14px;border-radius:12px;font-size:12px;border:0.5px solid var(--border);cursor:pointer;color:var(--text2);background:transparent}
.tag.active{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.combo-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
.combo-input{width:100%;padding:7px 32px 7px 10px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font)}
.combo-arrow{position:absolute;right:9px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:12px;color:var(--text3)}
.combo-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);z-index:200;max-height:220px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.10)}
.combo-dropdown.open{display:block}
.combo-item{padding:9px 12px;font-size:13px;cursor:pointer;color:var(--text);border-bottom:0.5px solid var(--border)}
.combo-item:last-child{border-bottom:none}
.combo-item:hover,.combo-item.focused{background:var(--bg2)}
.combo-item-sub{font-size:11px;color:var(--text2);margin-top:3px}
.combo-empty{padding:12px;font-size:13px;color:var(--text3);text-align:center}
.add-area{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.add-area-label{font-size:12px;color:var(--text2);margin-bottom:8px}
.add-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.prod-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.prod-table th{text-align:left;font-weight:500;font-size:12px;color:var(--text2);padding:7px 10px;border-bottom:0.5px solid var(--border)}
.prod-table td{padding:9px 10px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
.prod-table tr:last-child td{border-bottom:none}
.qty-input{width:66px;text-align:center;font-size:13px;padding:5px 6px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font)}
.total-row{display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:10px 10px;border-top:0.5px solid var(--border);margin-top:4px}
.chart-wrap{position:relative;width:100%}
.detail-row td{padding:0;border:none!important}
.detail-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto}
.detail-table th{text-align:left;font-weight:500;font-size:12px;color:var(--text2);padding:8px 10px;border-bottom:0.5px solid var(--border);white-space:nowrap}
.detail-table td{padding:10px 10px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle;white-space:normal;overflow:visible;text-overflow:clip}
/* detail-table は全行に仕切り線 */
.detail-table tfoot td{padding:9px 10px;border-top:0.5px solid var(--border)!important;border-bottom:none;font-weight:500}
</style>
</head>
<body>

<div id="app-screen">
<div class="titlebar">
  <div class="titlebar-icon">S</div>
  <h1>担当サロン 売上管理ダッシュボード</h1>
  <span class="titlebar-sub">Dr.Pure Labo</span>
</div>

<div class="main">
<div class="tabs">
  <button class="tab active" onclick="gotoTab('dashboard')">📊 ダッシュボード</button>
  <button class="tab" onclick="gotoTab('input')">✏️ データ入力</button>

<div id="view-input" class="view">

<script>
// ============================================================
// Supabase 設定（ここにあなたのプロジェクト情報を入力）
// ============================================================
const SUPABASE_URL  = 'https://isyjrdbyjnjfccrnpoke.supabase.co';
const SUPABASE_ANON = 'sb_publishable_BUC0ceUFEZBo4b1xd0h4hQ_cmXg5m-w';

let supabase = null;
let currentUser = null;

// Supabase REST API を直接呼ぶ軽量クライアント
function initSupabase() {
  if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
  supabase = {
    _url: SUPABASE_URL,
    _key: SUPABASE_ANON,
    _session: null,

    async _req(method, path, body, token) {
      const headers = {
        'apikey': SUPABASE_ANON,
        'Content-Type': 'application/json',
      };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(SUPABASE_URL + path, {
        method, headers,
        body: body ? JSON.stringify(body) : undefined
      });
      const data = await res.json().catch(() => ({}));
      return { data, error: res.ok ? null : data };
    },

    auth: {
      _parent: null,
      async signUp({ email, password }) {
        const r = await supabase._req('POST', '/auth/v1/signup', { email, password });
        if (!r.error && r.data.access_token) {
          supabase._session = r.data;
        }
        return { data: { user: r.data.user || null }, error: r.error };
      },
      async signInWithPassword({ email, password }) {
        const r = await supabase._req('POST', '/auth/v1/token?grant_type=password', { email, password });
        if (!r.error && r.data.access_token) {
          supabase._session = r.data;
          localStorage.setItem('sb_session', JSON.stringify(r.data));
        }
        return { data: { user: r.data.user || null, session: r.data }, error: r.error };
      },
      async signOut() {
        const token = supabase._session?.access_token;
        await supabase._req('POST', '/auth/v1/logout', {}, token);
        supabase._session = null;
        localStorage.removeItem('sb_session');
      },
      async getSession() {
        // localStorageから復元
        try {
          const stored = localStorage.getItem('sb_session');
          if (stored) {
            const sess = JSON.parse(stored);
            // トークンの有効期限確認
            if (sess.expires_at && Date.now() / 1000 < sess.expires_at) {
              supabase._session = sess;
              return { data: { session: { user: sess.user } } };
            } else {
              // リフレッシュを試みる
              if (sess.refresh_token) {
                const r = await supabase._req('POST', '/auth/v1/token?grant_type=refresh_token', { refresh_token: sess.refresh_token });
                if (!r.error && r.data.access_token) {
                  supabase._session = r.data;
                  localStorage.setItem('sb_session', JSON.stringify(r.data));
                  return { data: { session: { user: r.data.user } } };
                }
              }
              localStorage.removeItem('sb_session');
            }
          }
        } catch(e) {}
        return { data: { session: null } };
      },
      onAuthStateChange(callback) {
        // 軽量実装: 変化監視は簡易的に実装
        supabase._authCallback = callback;
        return { data: { subscription: { unsubscribe: () => {} } } };
      }
    },

    from(table) {
      return {
        _table: table,
        async select(cols) {
          const token = supabase._session?.access_token;
          const r = await supabase._req('GET', `/rest/v1/${table}?select=${cols || '*'}`, null, token);
          return { data: r.data, error: r.error };
        },
        async upsert(body, opts) {
          const token = supabase._session?.access_token;
          const headers = {
            'apikey': SUPABASE_ANON,
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            'Prefer': 'resolution=merge-duplicates'
          };
          const res = await fetch(SUPABASE_URL + `/rest/v1/${table}`, {
            method: 'POST', headers, body: JSON.stringify(body)
          });
          const data = await res.json().catch(() => ({}));
          return { data, error: res.ok ? null : data };
        },
        eq(col, val) {
          return {
            _table: table, _eq: { col, val },
            async single() {
              const token = supabase._session?.access_token;
              const r = await supabase._req('GET', `/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}&select=*`, null, token);
              const rows = Array.isArray(r.data) ? r.data : [];
              return { data: rows[0] || null, error: r.error };
            },
            async select(cols) {
              const token = supabase._session?.access_token;
              const r = await supabase._req('GET', `/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}&select=${cols||'*'}`, null, token);
              return { data: r.data, error: r.error };
            }
          };
        }
      };
    }
  };
  console.log('✓ Supabase軽量クライアント初期化完了');
}

// ---------- 認証UI ----------
let authMode = 'signin'; // 'signin' | 'signup'

function switchAuthTab(mode) {
  authMode = mode;
  const btn = document.getElementById('auth-btn');
  const t1  = document.getElementById('tab-signin');
  const t2  = document.getElementById('tab-signup');
  const info = document.getElementById('auth-info');
  if (!btn) return;
  if (mode === 'signin') {
    btn.textContent = 'ログイン';
    t1.style.color = '#378ADD'; t1.style.borderBottom = '2px solid #378ADD';
    t2.style.color = 'var(--text2)'; t2.style.borderBottom = 'none';
  } else {
    btn.textContent = 'アカウントを作成';
    t2.style.color = '#378ADD'; t2.style.borderBottom = '2px solid #378ADD';
    t1.style.color = 'var(--text2)'; t1.style.borderBottom = 'none';
  }
  if (info) info.style.display = 'none';
  setAuthError('');
}

function setAuthError(msg) {
  const el = document.getElementById('auth-error');
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function doAuth() {
  if (!supabase) { setAuthError('Supabase未設定です。SUPABASE_URLとSUPABASE_ANON_KEYを設定してください。'); return; }
  const email = document.getElementById('auth-email')?.value.trim();
  const pass  = document.getElementById('auth-pass')?.value;
  if (!email || !pass) { setAuthError('メールアドレスとパスワードを入力してください'); return; }
  const btn = document.getElementById('auth-btn');
  if (btn) btn.disabled = true;
  setAuthError('');

  try {
    let result;
    if (authMode === 'signup') {
      result = await supabase.auth.signUp({ email, password: pass });
      if (!result.error) {
        const info = document.getElementById('auth-info');
        if (info) info.style.display = 'block';
        if (btn) btn.disabled = false;
        return;
      }
    } else {
      result = await supabase.auth.signInWithPassword({ email, password: pass });
    }
    if (result.error) {
      const msg = result.error.message.includes('Invalid login') ? 'メールアドレスまたはパスワードが違います'
                : result.error.message.includes('Email not confirmed') ? 'メールアドレスを確認してください'
                : result.error.message.includes('Password should be') ? 'パスワードは6文字以上にしてください'
                : result.error.message;
      setAuthError(msg);
    } else {
      currentUser = result.data.user;
      await onSignedIn();
    }
  } catch(e) {
    setAuthError('通信エラーが発生しました: ' + e.message);
  }
  if (btn) btn.disabled = false;
}

async function doSignOut() {
  if (supabase) await supabase.auth.signOut();
  currentUser = null;
  showAuthScreen();
}

// 認証機能削除済み

async function onSignedIn() {
  showAppScreen(currentUser?.email || '');
  await loadState();
  seedDemo();
  populateAll();
  renderDashboard();
  renderMonthBtns();
}

// ---------- 起動時の認証チェック ----------
async function initAuth() {
  initSupabase();

  // Supabase未設定の場合もログイン画面を表示（バイパス不可）
  if (!supabase) {
    setAuthError('アプリの設定が完了していません。管理者にお問い合わせください。');
    showAuthScreen();
    return;
  }

  // セッション確認
  const { data: { session } } = await supabase.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    await onSignedIn();
  } else {
    showAuthScreen();
  }

  // セッション変化を監視
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      currentUser = session.user;
      await onSignedIn();

// Electron環境ではIPCでファイル保存、ブラウザではlocalStorage
function applyData(d) {
  if (!d || typeof d !== 'object') return;
  S.data = d.data || {};
  if (d.masterVersion && d.masterVersion === MASTER_VERSION) {
    S.salons   = d.salons   || DEFAULT_SALONS.slice();
    S.products = d.products || DEFAULT_PRODUCTS.map(p=>({...p}));
  } else {
    S.salons   = DEFAULT_SALONS.slice();
    S.products = DEFAULT_PRODUCTS.map(p=>({...p}));
  }
  S.rankType   = d.rankType   || S.rankType;
  S.inputMonth = (d.inputMonth !== undefined) ? d.inputMonth : S.inputMonth;
  S.inputYear  = (d.inputYear  !== undefined) ? d.inputYear  : S.inputYear;
  S.inputSalon = d.inputSalon || S.inputSalon;
}

async function loadState() {
  try {
    // 1) Supabaseからロード（ログイン中の場合）
    if (supabase && currentUser) {
      const { data: row, error } = await supabase
        .from('user_data')
        .eq('user_id', currentUser.id)
        .single();
      if (!error && row?.payload) {
        applyData(row.payload);
        return;
      }
    }
    // 2) Electronのローカルファイル
    if (window.electronAPI) {
      const d = await window.electronAPI.loadData();
      applyData(d);
      return;
    }
    // 3) localStorage（ブラウザ）
    const sv = localStorage.getItem('dplab_desktop');
    if (sv) applyData(JSON.parse(sv));
  } catch(e) { console.error('loadState error:', e); }
}

function save() {
  try {
    const payload = JSON.parse(JSON.stringify(S));
    payload.masterVersion = MASTER_VERSION;

    // 1) Supabaseに保存（ログイン中の場合）
    if (supabase && currentUser) {
      supabase
        .from('user_data')
        .upsert({ user_id: currentUser.id, payload }, { onConflict: 'user_id' })
        .then(({ error }) => { if (error) console.error('Supabase save error:', error); });
    }
    // 2) Electronのローカルファイル（バックアップ）
    if (window.electronAPI) {
      window.electronAPI.saveData(payload);
    } else {
      // 3) localStorage（バックアップ）
      localStorage.setItem('dplab_desktop', JSON.stringify(payload));
    }
  } catch(e) { console.error('save error:', e); }
}

function ensureMD(salon,year,month){
  if(!S.data[salon])S.data[salon]={};
  if(!S.data[salon][year])S.data[salon][year]={};
  if(!S.data[salon][year][month])S.data[salon][year][month]={sales:0,goal:0,products:{},history:{}};
  return S.data[salon][year][month];
}

  const all=[...new Set(S.products.map(p=>p.series))];

function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
let comboFocusIdx=-1;
function initCombo(){comboFocusIdx=-1;}
function getFiltered(){const q=(document.getElementById('combo-input')?.value||'').toLowerCase();return S.products.filter(p=>q===''||p.name.toLowerCase().includes(q)||p.series.toLowerCase().includes(q));}
function renderComboItems(items){
  const dd=document.getElementById('combo-dd');if(!dd)return;
  if(!items.length){dd.innerHTML='<div class="combo-empty">該当なし</div>';return;}
  dd.innerHTML=items.map((p,i)=>{const bg=sColor(p.series,'bg');const tc=sColor(p.series,'text');
    return`<div class="combo-item" data-name="${p.name}" data-idx="${i}" onmousedown="selectCombo(event,'${esc(p.name)}')">
      <div>${p.name}</div>
      <div class="combo-item-sub"><span class="spill" style="background:${bg};color:${tc}">${p.series}</span> <span style="margin-left:6px">${p.price.toLocaleString()}円</span></div>
    </div>`;}).join('');
}
function openCombo(){const dd=document.getElementById('combo-dd');if(!dd)return;renderComboItems(getFiltered());dd.classList.add('open');comboFocusIdx=-1;}
function filterCombo(){renderComboItems(getFiltered());document.getElementById('combo-dd')?.classList.add('open');comboFocusIdx=-1;}
function closeCombo(){document.getElementById('combo-dd')?.classList.remove('open');comboFocusIdx=-1;}
function selectCombo(e,name){e.preventDefault();const inp=document.getElementById('combo-input');if(inp)inp.value=name;closeCombo();document.getElementById('add-qty')?.focus();}
function comboKeydown(e){
  const dd=document.getElementById('combo-dd');const items=dd?.querySelectorAll('.combo-item');if(!items||!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();comboFocusIdx=Math.min(comboFocusIdx+1,items.length-1);updFocus(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();comboFocusIdx=Math.max(comboFocusIdx-1,0);updFocus(items);}
  else if(e.key==='Enter'&&comboFocusIdx>=0){e.preventDefault();selectCombo({preventDefault:()=>{}},items[comboFocusIdx].dataset.name);}
  else if(e.key==='Escape')closeCombo();
}
function updFocus(items){items.forEach((el,i)=>el.classList.toggle('focused',i===comboFocusIdx));if(comboFocusIdx>=0)items[comboFocusIdx].scrollIntoView({block:'nearest'});}
document.addEventListener('click',e=>{if(!document.getElementById('combo-wrap')?.contains(e.target))closeCombo();});

function addEntry(salon,year,month){
  const name=(document.getElementById('combo-input')?.value||'').trim();
  const qty=parseInt(document.getElementById('add-qty')?.value)||1;
  if(!name)return;
  const p=S.products.find(p=>p.name===name);
  if(!p){showNotice('マスタに登録されていない商品です');return;}
  const d=ensureMD(salon,year,month);
  d.products[name]={qty:(d.products[name]?.qty||0)+qty,price:p.price};
  save();
  if(document.getElementById('combo-input'))document.getElementById('combo-input').value='';
  if(document.getElementById('add-qty'))document.getElementById('add-qty').value='1';
  renderInputForm();
}
function updateHistQty(salon,year,month,name,val,price){
  const d=ensureMD(salon,year,month);
  if(!d.history)d.history={};
  const q=parseInt(val)||0;
  const oldQty=d.history[name]?.qty||0;
  const diff=(q-oldQty)*(price||0);
  if(q<=0){
    delete d.history[name];
  } else {
    d.history[name]={qty:q,price};
  }
  d.sales=Math.max(0,(d.sales||0)+diff);
  save();
  // 合計行だけ更新
  const total=Object.values(d.history).reduce((a,v)=>a+v.qty*(v.price||0),0);
  const gt=document.getElementById('grand-total');if(gt)gt.textContent=total.toLocaleString()+'円';
}
function removeHistEntry(salon,year,month,name){
  const d=ensureMD(salon,year,month);
  if(!d.history)return;
  const v=d.history[name];
  if(v){d.sales=Math.max(0,(d.sales||0)-v.qty*(v.price||0));}
  delete d.history[name];
  save();renderInputForm();
}
function clearHistory(salon,year,month){
  if(!confirm('反映済み履歴をすべてクリアしますか？\n売上金額はそのまま保持されます。'))return;
  const d=ensureMD(salon,year,month);
  d.history={};
  save();renderInputForm();
}
function removeEntry(salon,year,month,name){const d=ensureMD(salon,year,month);delete d.products[name];save();renderInputForm();}
function updateQty(salon,year,month,name,val,price){
  const d=ensureMD(salon,year,month);const q=parseInt(val)||0;
  if(q<=0)delete d.products[name];else d.products[name]={qty:q,price};
  save();
  const key=btoa(encodeURIComponent(name)).replace(/[^a-zA-Z0-9]/g,'');
  const sub=document.getElementById('sub-'+key);if(sub)sub.textContent=(q*price).toLocaleString()+'円';
  const total=Object.values(ensureMD(salon,year,month).products).reduce((a,v)=>a+v.qty*(v.price||0),0);
  const gt=document.getElementById('grand-total');if(gt)gt.textContent=total.toLocaleString()+'円';
}
function updateField(salon,year,month,field,val){ensureMD(salon,year,month)[field]=parseInt(val)||0;save();showNotice('✓ 保存しました');}
function autoFill(salon,year,month){
  const d=ensureMD(salon,year,month);
  if(!d.history)d.history={};
  const addAmount=Object.values(d.products).reduce((a,v)=>a+v.qty*(v.price||0),0);
  if(addAmount===0){showNotice('商品が入力されていません');return;}
  // historyに今回分を累計マージ
  Object.entries(d.products).forEach(([name,v])=>{
    if(!d.history[name])d.history[name]={qty:0,price:v.price};
    d.history[name].qty+=v.qty;
    d.history[name].price=v.price;
  });
  d.sales=(d.sales||0)+addAmount;
  // 入力欄をクリア
  d.products={};
  save();renderInputForm();showNotice('✓ '+addAmount.toLocaleString()+'円を加算（月累計: '+d.sales.toLocaleString()+'円）');
}
function showNotice(msg,targetId){
  // targetId省略時はデータ入力タブのnotice、なければmaster-noticeを探す
  const id=targetId||(document.getElementById('inp-notice')?'inp-notice':'master-notice');
  const n=document.getElementById(id);
  if(n){n.textContent=msg;setTimeout(()=>{if(n)n.textContent=''},2500);}
}

function closeInlineDetail(){
  document.querySelectorAll('.detail-row').forEach(r=>{
    r.style.display='none';
    const td=r.querySelector('td');if(td)td.innerHTML='';
  });
}
function toggleInlineDetail(type, arg1, year, months, rowIdx, seriesName){
  const prefix = type==='salon'?'s':type==='product'?'p':'ser';
  const detailId = prefix+'detail-'+rowIdx;
  const detailRow = document.getElementById(detailId);
  if(!detailRow) return;

  // 既に開いていれば閉じる
  if(detailRow.style.display !== 'none'){
    detailRow.style.display='none';
    const td=detailRow.querySelector('td');if(td)td.innerHTML='';
    return;
  }

  // 他の開いている詳細をすべて閉じる
  closeInlineDetail();

  // 内容を生成
  let innerHTML='';
  if(type==='salon') innerHTML=buildSalonDetailHTML(arg1,year,months);
  else if(type==='product') innerHTML=buildProductDetailHTML(arg1);
  else if(type==='series') innerHTML=buildSeriesDetailHTML(arg1,seriesName);

  const td=detailRow.querySelector('td');
  const closeBtn=document.createElement('button');
  closeBtn.textContent='✕';
  closeBtn.style.cssText='background:none;border:none;cursor:pointer;font-size:18px;color:var(--text2);line-height:1';
  closeBtn.onclick=function(){detailRow.style.display='none';td.innerHTML='';};
  const btnWrap=document.createElement('div');
  btnWrap.style.cssText='display:flex;justify-content:flex-end;margin-bottom:6px';
  btnWrap.appendChild(closeBtn);
  const wrap=document.createElement('div');
  wrap.style.cssText='padding:16px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-lg);margin:8px 0;box-shadow:0 1px 6px rgba(0,0,0,0.06)';
  wrap.appendChild(btnWrap);
  wrap.insertAdjacentHTML('beforeend',innerHTML);
  td.innerHTML='';
  td.appendChild(wrap);
  detailRow.style.display='';
}

function buildSalonDetailHTML(salon, year, months){
  const agg={};
  months.forEach(m=>{
    const d=S.data[salon]?.[year]?.[m];if(!d)return;
    // historyとproducts両方を集計
    const merged={};
    Object.entries(d.history||{}).forEach(([n,v])=>{if(!merged[n])merged[n]={qty:0,price:v.price};merged[n].qty+=v.qty;});
    Object.entries(d.products||{}).forEach(([n,v])=>{if(!merged[n])merged[n]={qty:0,price:v.price};merged[n].qty+=v.qty;});
    Object.entries(merged).forEach(([name,v])=>{
      const p=S.products.find(p=>p.name===name)||{series:'',price:v.price};
      if(!agg[name])agg[name]={name,series:p.series,price:v.price,qty:0,sales:0};
      agg[name].qty+=v.qty;agg[name].sales+=v.qty*(v.price||0);
    });
  });
  const rows=Object.values(agg).filter(r=>r.qty>0).sort((a,b)=>b.sales-a.sales);
  const pl=months.length===12?year+'年 年間':MONTHS[months[0]];
  if(!rows.length) return '<div style="font-size:13px;color:var(--text3);padding:4px">購入データなし</div>';
  return '<div style="font-size:13px;font-weight:500;margin-bottom:8px">'+salon+' — '+pl+' 購入商品内訳</div>'+
    '<table class="detail-table"><thead><tr><th>商品名</th><th style="text-align:right;width:60px">数量</th><th style="text-align:right;width:100px">金額</th></tr></thead>'+
    '<tbody>'+rows.map(r=>{const bg=sColor(r.series,'bg');const tc=sColor(r.series,'text');
      return'<tr>'+'<td style="padding:10px 10px;border-bottom:0.5px solid rgba(0,0,0,0.12);vertical-align:middle;white-space:normal"><div>'+r.name+'</div><span class="spill" style="background:'+bg+';color:'+tc+'">'+r.series+'</span></td>'+'<td style="padding:10px 10px;border-bottom:0.5px solid rgba(0,0,0,0.12);text-align:right;vertical-align:middle">'+r.qty+'</td>'+'<td style="padding:10px 10px;border-bottom:0.5px solid rgba(0,0,0,0.12);text-align:right;vertical-align:middle">'+r.sales.toLocaleString()+'円</td></tr>';}).join('')+
    '</tbody><tfoot><tr>'+
      '<td>合計</td>'+
      '<td style="text-align:right">'+rows.reduce((a,r)=>a+r.qty,0)+'</td>'+
      '<td style="text-align:right">'+rows.reduce((a,r)=>a+r.sales,0).toLocaleString()+'円</td>'+
    '</tr></tfoot></table>';
}

  const r = typeof jsonStr==='string' ? JSON.parse(jsonStr) : jsonStr;
  const bg=sColor(r.series,'bg');const tc=sColor(r.series,'text');
  const salonRows=Object.entries(r.salons||{}).filter(([,v])=>v.qty>0).sort((a,b)=>b[1].sales-a[1].sales);
  const maxQty=salonRows[0]?.[1]?.qty||1;
  if(!salonRows.length) return '<div style="font-size:13px;color:var(--text3);padding:4px">購入データなし</div>';

    '<div style="margin-bottom:8px"><span class="spill" style="background:'+bg+';color:'+tc+'">'+r.series+'</span></div>'+
    '<table class="detail-table"><thead><tr><th>サロン名</th><th style="text-align:right;width:60px">数量</th><th style="text-align:right;width:100px">金額</th></tr></thead>'+
    '<tbody>'+salonRows.map(([salon,v])=>'<tr><td style="padding:10px 10px;border-bottom:0.5px solid rgba(0,0,0,0.12);vertical-align:middle;white-space:normal"><div>'+salon+'</div><div class="bar-wrap" style="margin-top:3px"><div class="bar-fill" style="width:'+Math.round(v.qty/maxQty*100)+'%;background:#378ADD"></div></div></td><td style="padding:10px 10px;border-bottom:0.5px solid rgba(0,0,0,0.12);text-align:right;vertical-align:middle">'+v.qty+'</td><td style="padding:10px 10px;border-bottom:0.5px solid rgba(0,0,0,0.12);text-align:right;vertical-align:middle">'+v.sales.toLocaleString()+'円</td></tr>').join('')+
    '</tbody><tfoot><tr>'+
      '<td>合計</td>'+
      '<td style="text-align:right">'+salonRows.reduce((a,[,v])=>a+v.qty,0)+'</td>'+
      '<td style="text-align:right">'+salonRows.reduce((a,[,v])=>a+v.sales,0).toLocaleString()+'円</td>'+

function buildSeriesDetailHTML(productsJson, seriesName){
  const products = typeof productsJson==='string' ? JSON.parse(productsJson) : productsJson;
  const rows=Object.entries(products).filter(([,v])=>v.qty>0).sort((a,b)=>b[1].sales-a[1].sales);
  const bg=sColor(seriesName,'bg');const tc=sColor(seriesName,'text');
  if(!rows.length) return '<div style="font-size:13px;color:var(--text3);padding:4px">購入データなし</div>';
  return '<div style="font-size:13px;font-weight:500;margin-bottom:8px"><span class="spill" style="background:'+bg+';color:'+tc+'">'+seriesName+'</span> シリーズ 商品内訳</div>'+
    '<table class="detail-table"><thead><tr><th>商品名</th><th style="text-align:right;width:60px">数量</th><th style="text-align:right;width:100px">金額</th></tr></thead>'+
    '<tbody>'+rows.map(([name,v])=>'<tr><td style="padding:10px 10px;border-bottom:0.5px solid rgba(0,0,0,0.12);vertical-align:middle;white-space:normal">'+name+'</td><td style="padding:10px 10px;border-bottom:0.5px solid rgba(0,0,0,0.12);text-align:right;vertical-align:middle">'+v.qty+'</td><td style="padding:10px 10px;border-bottom:0.5px solid rgba(0,0,0,0.12);text-align:right;vertical-align:middle">'+v.sales.toLocaleString()+'円</td></tr>').join('')+
    '</tbody><tfoot><tr>'+
      '<td>合計</td>'+

      '<td style="text-align:right">'+rows.reduce((a,[,v])=>a+v.sales,0).toLocaleString()+'円</td>'+
    '</tr></tfoot></table>';

function renderProductList(){
  document.getElementById('product-list').innerHTML=`<table>
    <thead><tr>
      <th style="width:24px"></th>
      <th>商品名</th>
      <th style="text-align:right;width:100px">単価</th>
      <th style="width:100px">シリーズ</th>
      <th style="width:60px;text-align:center">編集</th>
      <th style="width:40px"></th>
    </tr></thead>
    <tbody id="prod-tbody">${S.products.map((p,i)=>{const bg=sColor(p.series,'bg');const tc=sColor(p.series,'text');return`<tr id="prow-${i}" draggable="true" ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})" ondrop="dragDrop(event,${i})" ondragleave="dragLeave(event)" style="cursor:grab">
      <td style="text-align:center;color:var(--text3);font-size:16px;cursor:grab" title="ドラッグして並び替え">⠿</td>
      <td id="pname-${i}">${p.name}</td>
      <td style="text-align:right">${p.price.toLocaleString()}円</td>
      <td><span class="spill" style="background:${bg};color:${tc}">${p.series}</span></td>
      <td style="text-align:center"><button class="del-btn" style="color:var(--text2)" onclick="editProduct(${i})" title="編集">✎</button></td>
      <td><button class="del-btn" onclick="delProduct(${i})" title="削除">✕</button></td>
    </tr>`;}).join('')}
    </tbody></table>`;
}

// ===== ドラッグ＆ドロップ並び替え =====
let dragSrcIdx = -1;
function dragStart(e, i){
  dragSrcIdx = i;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.5';
}
function dragOver(e, i){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // ドロップ先の行をハイライト
  document.querySelectorAll('#prod-tbody tr').forEach(r=>r.style.borderTop='');
  if(i !== dragSrcIdx){
    const row = document.getElementById('prow-'+i);
    if(row) row.style.borderTop = '2px solid #378ADD';
  }
}
function dragLeave(e){
  e.currentTarget.style.borderTop = '';
}
function dragDrop(e, i){
  e.preventDefault();
  if(dragSrcIdx === -1 || dragSrcIdx === i) return;
  // 並び替え実行
  const moved = S.products.splice(dragSrcIdx, 1)[0];
  S.products.splice(i, 0, moved);
  dragSrcIdx = -1;
  save();
  renderProductList();
}
function editProduct(i){
  const p=S.products[i];
  const row=document.getElementById('prow-'+i);
  if(!row)return;
  // すでに編集中なら何もしない
  if(row.querySelector('input'))return;
  const nameCell=document.getElementById('pname-'+i);
  const orig=p.name;
  nameCell.innerHTML=`<input type="text" value="${orig.replace(/"/g,'&quot;')}"
    id="pedit-${i}" style="width:100%;font-size:13px;padding:3px 6px;border:0.5px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-family:var(--font)"
    onkeydown="if(event.key==='Enter')saveProductName(${i});if(event.key==='Escape')renderProductList();">
    <span style="font-size:11px;color:var(--text3);margin-left:4px">Enter で確定 / Escでキャンセル</span>`;
  document.getElementById('pedit-'+i)?.focus();
}
function saveProductName(i){
  const inp=document.getElementById('pedit-'+i);
  if(!inp)return;
  const newName=inp.value.trim();
  if(!newName){renderProductList();return;}
  const oldName=S.products[i].name;
  S.products[i].name=newName;
  // data内の商品名キーも付け替え
  Object.keys(S.data).forEach(salon=>{
    Object.keys(S.data[salon]||{}).forEach(year=>{
      Object.keys(S.data[salon][year]||{}).forEach(month=>{
        const d=S.data[salon][year][month];
        if(d.products&&d.products[oldName]!==undefined){
          d.products[newName]=d.products[oldName];
          delete d.products[oldName];
        }
      });
    });
  });
  save();
  renderProductList();
  showNotice('✓ 商品名を更新しました','master-notice');
}
function addProduct(){
  const n=document.getElementById('m-name').value.trim();
  const prStr=document.getElementById('m-price').value;
  const pr=prStr===''?0:parseInt(prStr)||0;
  const s=document.getElementById('m-series').value.trim();
  if(!n||!s)return;  // 単価は0円でもOK
  S.products.push({name:n,price:pr,series:s});save();
  document.getElementById('m-name').value='';document.getElementById('m-price').value='';document.getElementById('m-series').value='';
  renderProductList();
}
function delProduct(i){S.products.splice(i,1);save();renderProductList();}
function renderSalonList(){
  document.getElementById('salon-list').innerHTML=`<table>
    <thead><tr><th>サロン名</th><th style="width:40px"></th></tr></thead>
    <tbody>${S.salons.map((s,i)=>`<tr><td>${s}</td><td><button class="del-btn" onclick="delSalon(${i})">✕</button></td></tr>`).join('')}</tbody>
  </table>`;
}
function addSalon(){const n=document.getElementById('m-salon').value.trim();if(!n||S.salons.includes(n))return;S.salons.push(n);save();document.getElementById('m-salon').value='';populateAll();renderSalonList();}
function delSalon(i){S.salons.splice(i,1);save();populateAll();renderSalonList();}
function gotoTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{['dashboard','input','ranking','master'].forEach((n,j)=>{if(i===j)t.classList.toggle('active',n===name);});});
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(name==='dashboard'){populateAll();renderDashboard();}
  if(name==='input'){populateAll();renderMonthBtns();renderInputForm();}
  if(name==='ranking'){populateAll();renderRanking();}
  if(name==='master'){renderProductList();renderSalonList();}
}
// 起動時：直接アプリを初期化
(async () => {
  try {
    await loadState();
    seedDemo();
    populateAll();
    renderDashboard();
    renderMonthBtns();
  } catch(e) {
    console.error('初期化エラー:', e);
    populateAll();
    renderDashboard();
    renderMonthBtns();
  }
})();
</script>
